services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-health_hub}"
      POSTGRES_USER: "${POSTGRES_USER:-healthhub_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-healthhub_password}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-healthhub_user} -d ${POSTGRES_DB:-health_hub}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
